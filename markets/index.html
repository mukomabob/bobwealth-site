<script type="module">
  import { MarketDataStore } from './marketDataStore.js';
  import { calculateInvestmentMetrics } from './investmentEngine.js';
  import { renderScreenerRow } from './screenerRenderer.js';

  async function initDashboard() {
    // 1. Fetch raw json feed
    const response = await fetch('./market-data.json');
    const rawData = await response.json();

    // 2. Initialize warehouse
    const store = new MarketDataStore(rawData);
    
    // 3. Extract partitioned datasets
    const cohort = store.getBaselineCohort();
    const allSecurities = store.getAllActiveInstruments();

    // 4. Run calculation calculations instantly
    const metrics = calculateInvestmentMetrics(cohort, 100);
    console.log("Calculated Dashboard KPI Portfolio Average:", metrics.averageValue);

    // 5. Append to UI Screener Table Grid
    const tableBody = document.getElementById('screenerTableBody');
    if (tableBody) {
      tableBody.innerHTML = allSecurities.map(c => renderScreenerRow(c)).join('');
    }
  }

  document.addEventListener('DOMContentLoaded', initDashboard);
</script>
